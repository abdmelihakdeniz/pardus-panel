name: Debian Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dh-python lintian \
            pybuild-plugin-pyproject python3-all python3-setuptools python3-wheel

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Lint Debian package
        run: lintian --profile debian --fail-on error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ../pardus-panel_*.deb --generate-notes --title "$GITHUB_REF_NAME"
