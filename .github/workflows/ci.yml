name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check Python files
        run: python -m compileall -q src

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Lint Python code
        uses: astral-sh/ruff-action@v4.0.0
        with:
          version: "0.15.12"
          args: check --output-format=github
          src: >-
            ./src
            ./tests

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream build-essential debhelper desktop-file-utils \
            dh-python gettext libgtk-3-bin lintian pybuild-plugin-pyproject \
            python3-all python3-setuptools python3-wheel xvfb

      - name: Validate GTK interfaces
        run: |
          for file in src/pardus_panel/data/ui/*.ui; do
            xvfb-run -a gtk-builder-tool validate "$file"
          done

      - name: Validate desktop metadata
        run: |
          desktop-file-validate src/pardus_panel/data/applications/tr.org.pardus.panel.desktop
          appstreamcli validate --no-net src/pardus_panel/data/metainfo/tr.org.pardus.panel.metainfo.xml

      - name: Validate translations
        run: msgfmt --check --output-file=/dev/null po/tr.po

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b

      - name: Lint Debian package
        run: lintian --profile debian --fail-on error
